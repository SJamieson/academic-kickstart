# Build this source repo (Astro) and cross-push the rendered site to the USER
# pages repo SJamieson/SJamieson.github.io (served at https://www.stewartjamieson.com/
# via CNAME).
#
# SAFE TO LAND ON master: the deploy step needs the `ACTIONS_DEPLOY_KEY` secret (an SSH
# private key whose public half is a write Deploy Key on the pages repo). It ALSO requires,
# for push events, the repo variable `AUTO_DEPLOY == 'true'`. So:
#   * pushes to master build-only until you set AUTO_DEPLOY=true;
#   * `workflow_dispatch` with dry_run=true  -> build-only smoke test;
#   * `workflow_dispatch` with dry_run=false -> deploys now (key permitting).
# Recommended first-run order: push -> dispatch(dry_run=true) -> dispatch(dry_run=false)
# -> set AUTO_DEPLOY=true for hands-off deploys thereafter.

name: Deploy site to SJamieson.github.io

on:
  push:
    branches: ["master"]      # source repo default branch
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do NOT deploy (smoke test)"
        type: boolean
        default: false

env:
  NODE_VERSION: "22"

concurrency:
  group: deploy-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Lets the deploy step self-skip until the secret is configured, so this workflow
      # can sit on master and build cleanly without a failing deploy.
      HAS_DEPLOY_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY != '' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          lfs: true   # materialize Git LFS assets (e.g. the slides PDF) for the build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to SJamieson.github.io (cross-repo)
        # Deploys when the key exists AND either:
        #   - a manual run (workflow_dispatch) that isn't a dry_run, or
        #   - a push to master while the repo variable AUTO_DEPLOY == 'true'.
        if: >-
          env.HAS_DEPLOY_KEY == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') ||
            (github.event_name == 'push' && vars.AUTO_DEPLOY == 'true')
          )
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4.0.0
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: SJamieson/SJamieson.github.io
          publish_branch: master           # the pages repo's GitHub Pages branch
          publish_dir: ./dist              # Astro build output
          cname: www.stewartjamieson.com   # preserve the custom domain
          # force_orphan: keep a single-commit history on the Pages repo so large built
          # assets (e.g. the slides PDF) never accumulate across deploys.
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy ${{ github.sha }} from academic-kickstart (Astro)"
